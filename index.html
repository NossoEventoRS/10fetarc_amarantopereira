<!doctype html>
<html lang='pt-BR'>
<head>
    <meta charset='utf-8'>

    <title>Portal FETARC</title>
    
    <link rel='stylesheet' href='style.css'>
</head>
<body>
    <header>
        <div class='logos'>
            <img src='https://raw.githubusercontent.com/NossoEventoRS/Imagens/refs/heads/main/Logos_apoiadores.png'>
        </div>
    </header>

    <section class='carousel'>
        <div class='slide active'><img src='https://raw.githubusercontent.com/NossoEventoRS/10fetarc_amarantopereira/refs/heads/main/Banner10.png'></div>
        <div class='slide'><img src='https://raw.githubusercontent.com/NossoEventoRS/10fetarc_amarantopereira/refs/heads/main/Banner20.png'></div>
        <div class='slide'><img src='https://raw.githubusercontent.com/NossoEventoRS/10fetarc_amarantopereira/refs/heads/main/Banner30.png'></div>
    </section>

    <main>
        <a class='btn red' href='http://10fetarc_grupo.nossoeventors.com.br/'>Danças Tradicionais | GRUPO</a>
        <a class='btn green' href='http://10fetarc_individuais.nossoeventors.com.br/'>Modalidades Individuais</a>
        <div class='xiru2'><h2>Inscrições Jogos Campeiros</h2><a class='wa' href='https://wa.me/5551996493176'>WhatsApp (51) 99649-3176</a></div>

        
        <div class='xiru'>
            <h2>Inscrições Modalidades individuais - Xirú</h2>
            <a class='wa' href='https://wa.me/5551989162019' target="_blank">WhatsApp 51 98916-2019</a>
        </div>
    </main>

    <footer>
        Sistema de Inscrição - NossoEventoRS © 2026 | dúvidas: contato@nossoevento.com.br
    </footer>

    <script>
        let i = 0;
        const s = document.querySelectorAll('.slide');
        
        setInterval(() => {
            if (s.length > 0) {
                s[i].classList.remove('active');
                i = (i + 1) % s.length;
                s[i].classList.add('active');
            }
        }, 5000);
    </script>
</body>
</html>

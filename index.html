<!doctype html>
<html lang='pt-BR'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width,initial-scale=1'>
    <title>Portal FETARC</title>
    <style>
        /* Estilos do Carrossel */
        .carousel {
            position: relative;
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            overflow: hidden;
            height: auto;
            aspect-ratio: 16 / 6;
            background-color: #f4efe5;
        }
        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            z-index: 1;
        }
        .slide.active {
            position: relative;
            opacity: 1;
            z-index: 2;
        }
        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Estilos Gerais do Portal */
        body { 
            font-family: Arial, sans-serif; 
            background-color: #f4efe5; 
            background-image: url('https://raw.githubusercontent.com/NossoEventoRS/Imagens/refs/heads/main/Fundo.png'); 
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat; 
            background-attachment: fixed;
            margin: 0; 
            padding: 0; 
            color: #333;
        }
        header { width: 100%; text-align: center; background: rgba(255, 247, 240, 0.9); box-shadow: 0 2px 5px rgba(0,0,0,0.1); padding: 10px 0; }
        header .logos img { max-width: 90%; height: auto; }
        
        main {
            max-width: 600px;
            margin: 30px auto;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 12px rgba(0,0,0,.2);
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .btn { 
            width: 90%; 
            padding: 16px; 
            color: white; 
            font-size: 18px; 
            border-radius: 12px; 
            text-decoration: none; 
            text-align: center; 
            font-weight: bold;
            transition: 0.3s; 
            box-shadow: 0 4px 10px rgba(0,0,0,.15);
        }
        .btn:hover { transform: scale(1.03); box-shadow: 0 6px 14px rgba(0,0,0,.25); }
        
        .btn.red { background: #e74c3c; }
        .btn.green { background: #139c01; }
        .btn.yellow { background: #f39c12; }

        .xiru { width: 100%; text-align: center; margin-top: 20px; border-top: 1px solid #ddd; padding-top: 20px; }
        .xiru h2 { font-size: 18px; color: #444; }
        .wa { display: inline-block; padding: 10px 20px; background: #25d366; color: white; text-decoration: none; border-radius: 30px; font-weight: bold; transition: 0.3s; }
        .wa:hover { background: #128c7e; transform: scale(1.05); }

        footer { text-align: center; padding: 20px 0; font-size: 12px; color: #fff; background: rgba(0,0,0,0.4); margin-top: 40px; }
    </style>
</head>
<body>

    <header>
        <div class='logos'>
            <img src='https://raw.githubusercontent.com/NossoEventoRS/Imagens/refs/heads/main/Logos_apoiadores.png'>
        </div>
    </header>

    <section class='carousel'>
        <div class='slide active'><img src='https://raw.githubusercontent.com/NossoEventoRS/Imagens/refs/heads/main/Banner1.png'></div>
        <div class='slide'><img src='https://raw.githubusercontent.com/NossoEventoRS/Imagens/refs/heads/main/Banner2.png'></div>
        <div class='slide'><img src='https://raw.githubusercontent.com/NossoEventoRS/Imagens/refs/heads/main/Banner3.png'></div>
    </section>

    <main>
        <a class='btn red' href='Grupo.html'>Danças Tradicionais | GRUPO</a>
        <a class='btn green' href='Individual.html'>Modalidades Individuais</a>
        <a class='btn yellow' href='campeiros.html'>Jogos Campeiros</a>
        
        <div class='xiru'>
            <h2>Inscrições Modalidades individuais - Xirú</h2>
            <a class='wa' href='https://wa.me/5551989162019' target="_blank">WhatsApp 51 98916-2019</a>
        </div>
    </main>

    <footer>
        Sistema de Inscrição - NossoEventoRS © 2026 | dúvidas: contato@nossoevento.com.br
    </footer>

    <script>
        let i = 0;
        const s = document.querySelectorAll('.slide');
        setInterval(() => {
            if (s.length > 0) {
                s[i].classList.remove('active');
                i = (i + 1) % s.length;
                s[i].classList.add('active');
            }
        }, 5000);
    </script>
</body>
</html>
